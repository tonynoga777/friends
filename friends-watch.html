    const prevEpisodeBtn = document.getElementById('prevEpisodeBtn');
    const nextEpisodeBtn = document.getElementById('nextEpisodeBtn');

    // Function to load the Jumpshare video for the selected episode
    function loadEpisode(seasonIndex, episodeIndex, autoplay = true) { // Removed resumeFromLastPosition as it's not applicable
        // Ensure that the requested season and episode exist
        if (!episodesBySeason[seasonIndex] || !episodesBySeason[seasonIndex][episodeIndex]) {
            console.error(`Error: Episode S${seasonIndex + 1}E${episodeIndex + 1} not found.`);
            // Optionally, load a default episode or show an error message
            return;
        }

        const episodeEmbedUrl = episodesBySeason[seasonIndex][episodeIndex];
        console.log(`Loading: Season ${seasonIndex + 1}, Episode ${episodeIndex + 1}, Jumpshare Embed URL: ${episodeEmbedUrl}`);

        // Construct the iframe HTML
        let iframeHtml = `<iframe src="${episodeEmbedUrl}" allowfullscreen`;

        // Jumpshare embeds might not have a direct autoplay parameter like standard video tags.
        // If Jumpshare provides an autoplay option, you'd add it here.
        // For example: if (autoplay) { iframeHtml += ` autoplay`; }
        // Often, embeds handle autoplay based on their own player settings or initial load.

        iframeHtml += `></iframe>`;

        // Update the content of the container with the new iframe
        jumpshareVideoContainer.innerHTML = iframeHtml;

        // Update the URL without reloading the page
        const newUrl = `?s=${seasonIndex + 1}&e=${episodeIndex + 1}`;
        history.pushState({ season: seasonIndex, episode: episodeIndex }, '', newUrl);

        // Update the download link
        // NOTE: This will only work if the Jumpshare embed URL also functions as a direct download link.
        // In most cases, Jumpshare embed URLs are for embedding, not direct file downloads.
        // If you want a download button, you'll need the direct MP4 file URL.
        downloadBtn.href = episodeEmbedUrl; // This will link to the embed page, not download the video
        downloadBtn.download = `Friends_S${seasonIndex + 1}_E${episodeIndex + 1}_Jumpshare.html`; // Suggest a .html extension as it's an embed page

        // Save the current episode and season to localStorage (for last watched tracking)
        localStorage.setItem('lastWatchedSeason', seasonIndex);
        localStorage.setItem('lastWatchedEpisode', episodeIndex);

        // Update dropdown selections
        episodeSelect.value = episodeIndex;
        currentSeasonIndex = seasonIndex;
        currentEpisodeIndex = episodeIndex;
    }

    // Function to populate episode dropdown for the selected season (unchanged)
    function populateEpisodeDropdown(seasonIndex) {
        episodeSelect.innerHTML = '';
        if (episodesBySeason[seasonIndex]) {
            episodesBySeason[seasonIndex].forEach((episodeUrl, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `Episode ${index + 1}`;
                episodeSelect.appendChild(option);
            });
        }
    }

    // saveProgress and videoPlayer.addEventListener('timeupdate', saveProgress);
    // videoPlayer.addEventListener('pause', saveProgress); are NOT applicable anymore.
    // The Jumpshare embed does not expose its current playback time to your script.

    // Event listener for season selection change
    seasonSelect.addEventListener('change', (e) => {
        const seasonIndex = parseInt(e.target.value);
        populateEpisodeDropdown(seasonIndex);
        if (episodesBySeason[seasonIndex] && episodesBySeason[seasonIndex].length > 0) {
            loadEpisode(seasonIndex, 0, true); // Autoplay the first episode of new season
        }
    });

    // Event listener for episode selection change
    episodeSelect.addEventListener('change', (e) => {
        const episodeIndex = parseInt(e.target.value);
        loadEpisode(currentSeasonIndex, episodeIndex, true); // Autoplay selected episode
    });

    // Event listener for previous episode button
    prevEpisodeBtn.addEventListener('click', () => {
        if (currentEpisodeIndex > 0) {
            loadEpisode(currentSeasonIndex, currentEpisodeIndex - 1, true);
        } else if (currentSeasonIndex > 0) {
            const prevSeasonEpisodes = episodesBySeason[currentSeasonIndex - 1];
            loadEpisode(currentSeasonIndex - 1, prevSeasonEpisodes.length - 1, true);
        }
    });

    // Event listener for next episode button
    nextEpisodeBtn.addEventListener('click', () => {
        if (currentEpisodeIndex < episodesBySeason[currentSeasonIndex].length - 1) {
            loadEpisode(currentSeasonIndex, currentEpisodeIndex + 1, true);
        } else if (currentSeasonIndex < episodesBySeason.length - 1) {
            loadEpisode(currentSeasonIndex + 1, 0, true);
        }
    });

    // Load the last watched episode (from localStorage) if available
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const savedSeason = urlParams.get('s');
        const savedEpisode = urlParams.get('e');

        if (savedSeason !== null && savedEpisode !== null) {
            const seasonIndex = parseInt(savedSeason) - 1;
            const episodeIndex = parseInt(savedEpisode) - 1;

            if (episodesBySeason[seasonIndex] && episodesBySeason[seasonIndex][episodeIndex]) {
                seasonSelect.value = seasonIndex;
                populateEpisodeDropdown(seasonIndex);
                loadEpisode(seasonIndex, episodeIndex, true);
            } else {
                populateEpisodeDropdown(0);
                loadEpisode(0, 0, true);
            }
        } else {
            populateEpisodeDropdown(0);
            loadEpisode(0, 0, true);
        }
    };

    // Handle back/forward browser navigation
    window.addEventListener('popstate', (event) => {
        if (event.state) {
            loadEpisode(event.state.season, event.state.episode, false); // Don't explicitly try to autoplay
        }
    });

    // Autoplay the next episode when the current episode ends
    // This functionality will NOT work directly with Jumpshare embeds as your script can't detect when their video ends.
    // If Jumpshare offers a JavaScript API for this, it would need to be integrated.

</script>
